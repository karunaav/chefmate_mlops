version: "3.9"

services:

  # ── Mealie (self-hosted recipe manager) ──────────────────
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - ALLOW_SIGNUP=true
      - BASE_URL=http://localhost:9000
    volumes:
      - mealie_data:/app/data

  # ── ChefMate Substitution API ─────────────────────────────
  chefmate-api:
    build:
      context: .
      dockerfile: serve/Dockerfile
    container_name: chefmate-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_URI=models:/chefmate-substitution/Production
      - VOCAB_PATH=data/processed/vocab.json
      - TOP_K=10
    depends_on:
      - mlflow

  # ── MLflow Tracking Server ───────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:////mlflow/mlflow.db
               --default-artifact-root /mlflow/artifacts"

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/chefmate.json

volumes:
  mealie_data:
  mlflow_data:
  grafana_data:
